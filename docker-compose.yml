services:
  zepto-finder:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - zepto-data:/data
    environment:
      # Optional Indian residential proxy, e.g. http://user:pass@host:port
      - PROXY_URL=${PROXY_URL:-}
      - ZEPTO_CONCURRENCY=${ZEPTO_CONCURRENCY:-5}
      # Abuse controls — set APP_TOKEN to gate a shared instance (see README).
      - APP_TOKEN=${APP_TOKEN:-}
      - MAX_RADIUS_KM=${MAX_RADIUS_KM:-15}
      - MAX_CONCURRENT_SEARCHES=${MAX_CONCURRENT_SEARCHES:-3}
      # Bandwidth / proxy-cost knobs — PROBES_PER_DAY is the main one.
      - PROBES_PER_DAY=${PROBES_PER_DAY:-3000}
      - PROBE_BURST=${PROBE_BURST:-400}
      - GLOBAL_SEARCHES_PER_DAY=${GLOBAL_SEARCHES_PER_DAY:-500}
      - GLOBAL_SEARCH_BURST=${GLOBAL_SEARCH_BURST:-20}
      - SEARCHES_PER_DAY=${SEARCHES_PER_DAY:-30}
      - SEARCH_BURST=${SEARCH_BURST:-3}
      - REQUESTS_PER_MIN=${REQUESTS_PER_MIN:-60}
      - REQUEST_BURST=${REQUEST_BURST:-30}
      - TRUST_FORWARDED_FOR=${TRUST_FORWARDED_FOR:-true}
    restart: unless-stopped

volumes:
  zepto-data:
